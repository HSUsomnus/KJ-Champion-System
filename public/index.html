<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="LINE LIFF 行事曆系統 - 團體與個人行程管理">
  <title>行事曆</title>
  <link rel="icon" type="image/png" href="/images/logo.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#06C755">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="康九系統">
  <link rel="apple-touch-icon" href="/images/logo.png">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- 網址帶 ?eruda=1 時載入 Eruda，方便手機 LINE 瀏覽器看 Console -->
  <script src="/js/eruda-loader.js"></script>
  <!-- 進入層：未登入時顯示 LINE 登入頁，已登入則直接進主頁（已拿掉登入動畫） -->
  <div id="entry-overlay" class="entry-overlay">
    <div id="entry-login" class="entry-login">
      <h2>📅 行事曆</h2>
      <p>請使用 LINE 帳號登入，以使用行程與成員功能。</p>
      <button type="button" class="btn-line-login" id="entry-line-login-btn">使用 LINE 登入</button>
    </div>
  </div>

  <div class="container page-calendar">
    <!-- 上半屏（50vh）：僅標題 + 月曆，月曆下緣固定在螢幕一半 -->
    <div class="calendar-page-fixed">
      <div class="page-header-row">
        <button type="button" class="btn-refresh-cache" onclick="if(window.cacheService){window.cacheService.clearCache();}location.reload();" title="清除快取並重新整理" aria-label="清除快取並重新整理">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        </button>
        <h1 class="calendar-page-title">📅 行事曆</h1>
      </div>
      <div class="calendar">
        <div class="calendar-header">
          <button id="calendar-prev" class="calendar-nav-btn">‹</button>
          <h2 id="calendar-month">2024年1月</h2>
          <button id="calendar-next" class="calendar-nav-btn">›</button>
        </div>
        <div id="calendar-grid" class="calendar-grid">
          <!-- 行事曆格子會由 JavaScript 動態生成 -->
        </div>
      </div>
    </div>

    <!-- 下半屏：「今日行程」與「新增行程」同一行、同高，底下為行程字卡 -->
    <div class="today-section-header" id="today-section-header">
      <h2 id="selected-date-title" class="selected-date-title-compact">今日行程</h2>
      <a href="/add-event.html" id="add-event-link" class="btn btn-primary btn-add-inline">➕ 新增行程</a>
    </div>
    <div id="today-events" class="today-events-scroll data-loading-parent">
      <div class="loading data-loading data-loading-overlay">
        <div class="data-loading-inner">
          <img src="/images/logo.png" alt="康九" class="data-loading-logo">
          <p class="data-loading-text">載入中...</p>
        </div>
      </div>
    </div>
  </div>

  <!-- 底部導航欄 -->
  <nav class="bottom-nav">
    <a href="/index.html" class="nav-item active">
      <div>📅</div>
      <span>行事曆</span>
    </a>
    <a href="/list.html" class="nav-item">
      <div>📋</div>
      <span>列表</span>
    </a>
    <a href="/members.html" class="nav-item">
      <div>👥</div>
      <span>成員</span>
    </a>
    <a href="/profile.html" class="nav-item">
      <div>👤</div>
      <span>個人</span>
    </a>
  </nav>

  <!-- JavaScript -->
  <script src="/js/auth.js"></script>
  <script src="/js/scroll-restore.js"></script>
  <script src="/js/share-dialog.js"></script>
  <script src="/js/cacheService.js"></script>
  <script src="/js/calendar.js"></script>
  <script>
    (function entryGate() {
      var overlay = document.getElementById('entry-overlay');
      var loginSection = document.getElementById('entry-login');

      function showMain() {
        if (overlay) overlay.classList.add('entry-overlay-hidden');
      }

      function showLogin() {
        if (overlay) overlay.classList.remove('entry-overlay-hidden');
      }

      function handleUser(userId) {
        if (!userId) {
          showLogin();
          return;
        }
        fetch('/api/members/check?userId=' + encodeURIComponent(userId))
          .then(function(r) { return r.json(); })
          .then(function(json) {
            if (json && json.success && json.data) {
              if (json.data.isRegistered) showMain();
              else {
                if (window.__savePageState) window.__savePageState();
                window.location.href = '/profile.html?userId=' + encodeURIComponent(userId) + '&auth=1';
              }
            } else {
              showMain();
            }
          })
          .catch(function() { showMain(); });
      }

      window.addEventListener('liffReady', function(e) {
        handleUser(e.detail && e.detail.userId);
      });

      // 補查：若 liffReady 在 listener 註冊前就已觸發（race condition），直接補跑
      if (window.LIFF && window.LIFF.isInitialized()) {
        handleUser(window.LIFF.getUserId());
      }

      var btn = document.getElementById('entry-line-login-btn');
      if (btn) btn.addEventListener('click', function() {
        this.disabled = true;
        this.textContent = '導向登入中…';
        if (window.LIFF && window.LIFF.login) window.LIFF.login();
        else triggerLogin();
      });
    })();
  </script>
</body>
</html>
