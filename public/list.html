<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="行程列表 - 依類型查看">
  <title>行程列表</title>
  <link rel="icon" type="image/png" href="/images/logo.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#06C755">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="康九系統">
  <link rel="apple-touch-icon" href="/images/logo.png">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- 網址帶 ?eruda=1 時載入 Eruda，方便手機 LINE 瀏覽器看 Console -->
  <script src="/js/eruda-loader.js"></script>
  <div class="container page-list">
    <div class="list-page-fixed">
      <div class="page-header-row">
        <button type="button" class="btn-refresh-cache" onclick="if(window.cacheService){window.cacheService.clearCache();}location.reload();" title="清除快取並重新整理" aria-label="清除快取並重新整理">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        </button>
        <h1 class="text-center page-title list-page-title">📋 行程列表</h1>
      </div>
    </div>

    <!-- 月份切換列：固定在分頁上方 -->
    <div class="month-nav-bar">
      <button type="button" class="month-nav-btn" id="prev-month-btn" aria-label="上一個月">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width: 20px; height: 20px;">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
      </button>
      <div class="month-display" id="current-month-display">
        2026年2月
      </div>
      <button type="button" class="month-nav-btn" id="next-month-btn" aria-label="下一個月">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width: 20px; height: 20px;">
          <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
      </button>
    </div>

    <!-- 分頁切換：標題列固定，底下字卡可捲動 -->
    <div class="tab-container" id="tab-container">
      <div class="tab-header list-tabs-fixed">
        <button class="tab-btn active" data-tab="全部">全部</button>
        <button class="tab-btn" data-tab="學員上課">學員上課</button>
        <button class="tab-btn" data-tab="活動">活動</button>
        <button class="tab-btn" data-tab="諮詢簽約">諮詢簽約</button>
      </div>
      
      <!-- 僅此區可捲動：行程字卡 -->
      <div class="tab-content-wrapper tab-cards-scroll" id="tab-content-wrapper">

        <!-- 全部分頁（預設顯示） -->
        <div id="tab-全部" class="tab-content active data-loading-parent">
          <div class="loading data-loading data-loading-overlay">
            <div class="data-loading-inner">
              <img src="/images/logo.png" alt="康九" class="data-loading-logo">
              <p class="data-loading-text">載入中...</p>
            </div>
          </div>
        </div>

        <!-- 學員上課分頁 -->
        <div id="tab-學員上課" class="tab-content data-loading-parent">
          <div class="loading data-loading data-loading-overlay">
            <div class="data-loading-inner">
              <img src="/images/logo.png" alt="康九" class="data-loading-logo">
              <p class="data-loading-text">載入中...</p>
            </div>
          </div>
        </div>

        <!-- 活動分頁 -->
        <div id="tab-活動" class="tab-content data-loading-parent">
          <div class="loading data-loading data-loading-overlay">
            <div class="data-loading-inner">
              <img src="/images/logo.png" alt="康九" class="data-loading-logo">
              <p class="data-loading-text">載入中...</p>
            </div>
          </div>
        </div>

        <!-- 諮詢簽約分頁 -->
        <div id="tab-諮詢簽約" class="tab-content data-loading-parent">
          <div class="loading data-loading data-loading-overlay">
            <div class="data-loading-inner">
              <img src="/images/logo.png" alt="康九" class="data-loading-logo">
              <p class="data-loading-text">載入中...</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 底部導航欄 -->
  <nav class="bottom-nav">
    <a href="/index.html" class="nav-item">
      <div>📅</div>
      <span>行事曆</span>
    </a>
    <a href="/list.html" class="nav-item active">
      <div>📋</div>
      <span>列表</span>
    </a>
    <a href="/members.html" class="nav-item">
      <div>👥</div>
      <span>成員</span>
    </a>
    <a href="/profile.html" class="nav-item">
      <div>👤</div>
      <span>個人</span>
    </a>
  </nav>

  <script src="/js/auth.js"></script>
  <script src="/js/scroll-restore.js"></script>
  <script src="/js/share-dialog.js"></script>
  <script src="/js/list.js"></script>
</body>
</html>
