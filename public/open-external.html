<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>正在開啟...</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#06C755">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="康九系統">
  <link rel="apple-touch-icon" href="/images/logo.png">
  <style>
    body { font-family: sans-serif; padding: 24px; text-align: center; }
    .btn { display: inline-block; padding: 12px 24px; background: #06C755; color: #fff; text-decoration: none; border-radius: 8px; margin-top: 16px; }
  </style>
</head>
<body>
  <div id="msg">正在嘗試在預設瀏覽器開啟...</div>
  <p id="fallback" style="display:none; margin-top:16px;">
    <a id="openBtn" href="#" class="btn">點此在預設瀏覽器開啟</a>
  </p>

  <script>
(function() {
  var ua = navigator.userAgent || '';
  var isLine = /Line\//i.test(ua) || /Line\/\d/i.test(ua);
  var isAndroid = /Android/i.test(ua);
  var isIOS = /iPhone|iPad|iPod/i.test(ua);
  var params = new URLSearchParams(window.location.search);
  var to = params.get('to') || (window.location.origin + '/');
  if (!/^https?:\/\//.test(to)) to = window.location.origin + (to.charAt(0) === '/' ? to : '/' + to);
  var redirected = params.get('redirected') === '1';

  function showFallback() {
    document.getElementById('msg').textContent = '請點擊下方按鈕，在手機/電腦的預設瀏覽器開啟';
    var btn = document.getElementById('openBtn');
    btn.href = to;
    document.getElementById('fallback').style.display = 'block';
  }

  if (!isLine) {
    window.location.href = to;
    return;
  }
  if (redirected) {
    showFallback();
    return;
  }

  if (isAndroid) {
    var hostPath = to.replace(/^https?:\/\//, '');
    var intentUrl = 'intent://' + hostPath + '#Intent;scheme=https;package=com.android.chrome;S.browser_fallback_url=' + encodeURIComponent(to) + ';end';
    window.location.href = intentUrl;
    setTimeout(showFallback, 1500);
  } else if (isIOS) {
    var safariUrl = 'x-safari-' + to.replace(/^http:\/\//, 'https://');
    window.location.href = safariUrl;
    setTimeout(showFallback, 1500);
  } else {
    showFallback();
  }
})();
  </script>
</body>
</html>
