<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="行程詳情">
  <title>行程詳情</title>
  <link rel="icon" type="image/png" href="/images/logo.png">
  <link rel="stylesheet" href="/css/style.css?v=3">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
  <!-- 網址帶 ?eruda=1 時載入 Eruda，方便手機 LINE 瀏覽器看 Console -->
  <script src="/js/eruda-loader.js"></script>
  <div class="container page-event-detail">
    <!-- LIFF 瀏覽器本身有上一頁，此頁不重複放上一頁按鈕 -->
    <div class="page-header-fixed">
      <div class="page-header-row">
        <button type="button" class="btn-refresh-cache" onclick="if(window.cacheService){window.cacheService.clearCache();}location.reload();" title="清除快取並重新整理" aria-label="清除快取並重新整理">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        </button>
        <h1 class="text-center page-title">📅 行程詳情</h1>
      </div>
    </div>

    <div class="event-detail-content-scroll data-loading-parent">
    <!-- 資料加載動畫（與行事曆進入動畫一致：透明毛玻璃 + 康九 logo） -->
    <div id="loading" class="loading data-loading data-loading-overlay">
      <div class="data-loading-inner">
        <img src="/images/logo.png" alt="康九" class="data-loading-logo">
        <p class="data-loading-text">載入中...</p>
      </div>
    </div>

    <!-- 行程詳情 -->
    <div id="event-detail" class="hidden">
      <div class="card">
        <div class="event-card-header">
          <h2 id="event-title">行程標題</h2>
          <span id="event-type" class="event-type">活動</span>
        </div>
        
        <div class="event-info">
          <div class="event-info-item">
            <span>📅</span>
            <span id="event-date">日期時間</span>
          </div>
          <div class="event-info-item" id="event-description-item">
            <span>📝</span>
            <div id="event-description">備註</div>
          </div>
        </div>

        <div class="event-actions mt-16">
          <button class="btn btn-primary btn-block share-btn" onclick="shareEvent()">
            🔗 分享
          </button>
          <button class="btn btn-secondary btn-block" onclick="editEvent()" id="edit-btn">
            ✏️ 編輯
          </button>
          <button class="btn btn-danger btn-block" onclick="deleteEvent()" id="delete-btn">
            🗑️ 刪除
          </button>
        </div>
      </div>
    </div>

    <!-- 編輯表單 -->
    <div id="edit-form" class="hidden">
      <div class="card">
        <h2 class="mb-16">編輯行程</h2>
        <form id="event-edit-form">
          <div class="form-group">
            <label class="form-label">標題 *</label>
            <input type="text" id="edit-title" class="form-input" required>
          </div>

          <div class="form-group">
            <label class="form-label">類型 *</label>
            <select id="edit-type" class="form-select" required>
              <option value="學員上課">學員上課</option>
              <option value="活動">活動</option>
              <option value="諮詢簽約">諮詢簽約</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">
              <input type="checkbox" id="edit-all-day" style="width: auto; margin-right: 8px;">
              整日活動
            </label>
          </div>

          <div class="form-group" id="edit-date-time-group">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px;">
              <div>
                <label class="form-label">開始日期 *</label>
                <input type="date" id="edit-date" class="form-input" required>
              </div>
              <div>
                <label class="form-label">結束日期</label>
                <input type="date" id="edit-end-date" class="form-input">
              </div>
            </div>
            <!-- 非整日時才顯示時間列（與 Google Calendar 一致） -->
            <div id="edit-time-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
              <div>
                <label class="form-label">開始時間 *</label>
                <input type="time" id="edit-start-time" class="form-input" required>
              </div>
              <div>
                <label class="form-label">結束時間 *</label>
                <input type="time" id="edit-end-time" class="form-input" required>
              </div>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">備註</label>
            <textarea id="edit-description" class="form-textarea"></textarea>
          </div>

          <div class="event-actions">
            <button type="button" class="btn btn-secondary" onclick="cancelEdit()">
              <span>取消</span>
            </button>
            <button type="submit" class="btn btn-primary">
              <span>✓</span>
              <span>儲存</span>
            </button>
          </div>
        </form>
      </div>
    </div>
    </div>
  </div>

  <!-- 底部導航欄（固定） -->
  <nav class="bottom-nav">
    <a href="/index.html" class="nav-item active">
      <div>📅</div>
      <span>行事曆</span>
    </a>
    <a href="/list.html" class="nav-item">
      <div>📋</div>
      <span>列表</span>
    </a>
    <a href="/members.html" class="nav-item">
      <div>👥</div>
      <span>成員</span>
    </a>
    <a href="/profile.html" class="nav-item">
      <div>👤</div>
      <span>個人</span>
    </a>
  </nav>

  <script src="/js/liff.js"></script>
  <script src="/js/scroll-restore.js"></script>
  <script src="/js/share-dialog.js"></script>
  <script src="/js/timePicker.js"></script>
  <script src="/js/datePicker.js"></script>
  <script src="/js/event-detail.js"></script>
  <script>
    (function() {
      var dev = window.LIFF && window.LIFF.isDevMode && window.LIFF.isDevMode();
      var q = dev ? '?dev=1' : '';
      document.querySelectorAll('.bottom-nav a').forEach(function(a) {
        var base = (a.getAttribute('href') || '').split('?')[0];
        if (base) a.href = base + q;
      });
    })();
  </script>
</body>
</html>
