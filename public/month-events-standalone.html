<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="月份行程">
  <title>月份行程</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#06C755">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="康九系統">
  <link rel="apple-touch-icon" href="/images/logo.png">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <script src="/js/eruda-loader.js"></script>
  <div class="container">
    <h1 class="text-center page-title" id="month-title" style="margin-bottom: 16px;">📅 月份行程</h1>

    <div class="data-loading-parent">
    <div id="loading" class="loading data-loading data-loading-overlay">
      <div class="data-loading-inner">
        <img src="/images/logo.png" alt="康九" class="data-loading-logo">
        <p class="data-loading-text">載入中...</p>
      </div>
    </div>

    <div id="events-content" class="hidden">
      <!-- 行程列表會由 JS 動態產生 -->
    </div>
    </div>
  </div>

  <!-- 獨立月份行程頁：完全不需要 LIFF，任何人都能直接看 -->
  <script>
    /**
     * 獨立月份行程頁：不需要 LIFF 登入，任何人（包括非 LINE 使用者）都能直接瀏覽
     */
    async function initMonthEvents() {
      const urlParams = new URLSearchParams(window.location.search);
      const year = urlParams.get('year');
      const month = urlParams.get('month');
      const type = urlParams.get('type');

      if (!year || !month || !type) {
        document.getElementById('loading').innerHTML = `
          <div class="empty-state">
            <div>❌</div>
            <p>缺少必要參數</p>
          </div>
        `;
        return;
      }

      document.getElementById('month-title').textContent = `📅 ${year}年${month}月 ${decodeURIComponent(type)}`;

      try {
        // 匿名訪問（不需要 LIFF）
        const response = await fetch(`/api/calendar/month?year=${year}&month=${month}&type=${encodeURIComponent(type)}`);
        const data = await response.json();

        if (data.success) {
          renderEvents(data.data, type);
          document.getElementById('loading').classList.add('hidden');
          document.getElementById('events-content').classList.remove('hidden');
        } else {
          throw new Error(data.message || '載入失敗');
        }
      } catch (error) {
        console.error('載入月份行程錯誤:', error);
        document.getElementById('loading').innerHTML = `
          <div class="empty-state">
            <div>❌</div>
            <p>載入失敗：${error.message}</p>
          </div>
        `;
      }
    }

    function renderEvents(events, type) {
      const container = document.getElementById('events-content');
      
      if (events.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div>📅</div>
            <p>本月沒有 ${type} 類型的行程</p>
          </div>
        `;
        return;
      }

      const sortedEvents = events.sort((a, b) => new Date(a.start) - new Date(b.start));
      
      let html = '';
      sortedEvents.forEach((event, index) => {
        const isAllDay = !!(event.allDay ?? event.all_day) || /^\d{4}-\d{2}-\d{2}$/.test(String(event.start || '').trim());
        const dateTime = formatDateTime(event.start, isAllDay);
        
        html += `
          <div class="card" style="margin-bottom: 12px;">
            <div class="event-card-header">
              <h3>${event.title || '無標題'}</h3>
              <span class="event-type ${event.type || '活動'}">${event.type || '活動'}</span>
            </div>
            <div class="event-info">
              <div class="event-info-item">
                <span>📅</span>
                <span>${dateTime}</span>
              </div>
              ${event.description ? `
              <div class="event-info-item">
                <span>📝</span>
                <div>${event.description}</div>
              </div>
              ` : ''}
            </div>
          </div>
        `;
      });

      container.innerHTML = html;
    }

    function formatDateTime(dateTimeStr, allDay = false) {
      const s = String(dateTimeStr).trim();
      const dateOnly = /^\d{4}-\d{2}-\d{2}$/.test(s);
      const date = dateOnly
        ? new Date(Number(s.slice(0, 4)), Number(s.slice(5, 7)) - 1, Number(s.slice(8, 10)))
        : new Date(dateTimeStr);

      if (allDay) {
        return date.toLocaleDateString('zh-TW', {
          year: 'numeric',
          month: 'long',
          day: 'numeric',
          weekday: 'long',
        });
      }

      const pad = (n) => n < 10 ? '0' + n : n;
      const dateStr = date.toLocaleDateString('zh-TW', {
        year: 'numeric',
        month: 'long',
        day: 'numeric',
        weekday: 'long',
      });
      const timeStr = pad(date.getHours()) + ':' + pad(date.getMinutes());
      return dateStr + ' ' + timeStr;
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initMonthEvents);
    } else {
      initMonthEvents();
    }
  </script>
</body>
</html>
