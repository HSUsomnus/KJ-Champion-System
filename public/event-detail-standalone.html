<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="行程詳情">
  <title>行程詳情</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- 網址帶 ?eruda=1 時載入 Eruda，方便手機 LINE 瀏覽器看 Console -->
  <script src="/js/eruda-loader.js"></script>
  <div class="container page-event-detail-standalone">
    <!-- 獨立詳情頁：無導航、無其他連結，僅顯示行程資訊 -->
    <h1 class="text-center page-title" style="margin-bottom: 16px;">📅 行程詳情</h1>

    <div class="event-detail-content-scroll data-loading-parent">
    <!-- 資料加載動畫 -->
    <div id="loading" class="loading data-loading data-loading-overlay">
      <div class="data-loading-inner">
        <img src="/images/logo.png" alt="康九" class="data-loading-logo">
        <p class="data-loading-text">載入中...</p>
      </div>
    </div>

    <!-- 行程詳情（唯讀、無按鈕） -->
    <div id="event-detail" class="hidden">
      <div class="card">
        <div class="event-card-header">
          <h2 id="event-title">行程標題</h2>
          <span id="event-type" class="event-type">活動</span>
        </div>
        
        <div class="event-info">
          <div class="event-info-item">
            <span>📅</span>
            <span id="event-date">日期時間</span>
          </div>
          <div class="event-info-item" id="event-description-item">
            <span>📝</span>
            <div id="event-description">備註</div>
          </div>
        </div>
      </div>
    </div>

    </div>
  </div>

  <!-- 獨立詳情頁：完全不需要 LIFF，任何人都能直接看 -->
  <script>
    /**
     * 獨立詳情頁：僅顯示行程資訊，無導航、無編輯刪除分享等按鈕
     * 不需要 LIFF 登入，任何人（包括非 LINE 使用者）都能直接瀏覽
     */
    let eventId = null;
    let eventData = null;

    async function initEventDetailStandalone() {
      const urlParams = new URLSearchParams(window.location.search);
      eventId = urlParams.get('id');

      if (!eventId) {
        document.getElementById('loading').innerHTML = `
          <div class="empty-state">
            <div>❌</div>
            <p>找不到行程 ID</p>
          </div>
        `;
        return;
      }

      // 直接載入，不等 LIFF
      loadEventDetail();
    }

    async function loadEventDetail() {
      const loading = document.getElementById('loading');
      const detailDiv = document.getElementById('event-detail');

      try {
        // 匿名訪問（不帶 userId）
        const url = `/api/calendar/events/${eventId}`;
        
        const response = await fetch(url);
        const data = await response.json();

        if (data.success) {
          eventData = data.data;
          renderEventDetail(data.data);
          loading.classList.add('hidden');
          detailDiv.classList.remove('hidden');
        } else {
          throw new Error(data.message || '載入行程詳情失敗');
        }
      } catch (error) {
        console.error('載入行程詳情錯誤:', error);
        loading.innerHTML = `
          <div class="empty-state">
            <div>❌</div>
            <p>載入失敗：${error.message}</p>
          </div>
        `;
      }
    }

    function renderEventDetail(event) {
      document.getElementById('event-title').textContent = event.title || '無標題';
      document.getElementById('event-type').textContent = event.type || '活動';
      document.getElementById('event-type').className = `event-type ${event.type || '活動'}`;
      const isAllDay = !!(event.allDay ?? event.all_day) || /^\d{4}-\d{2}-\d{2}$/.test(String(event.start || '').trim());
      document.getElementById('event-date').textContent = formatDateTime(event.start, isAllDay);

      const descriptionItem = document.getElementById('event-description-item');
      const descriptionDiv = document.getElementById('event-description');
      if (event.description) {
        descriptionDiv.textContent = event.description;
        descriptionItem.classList.remove('hidden');
      } else {
        descriptionItem.classList.add('hidden');
      }
    }

    function formatDateTime(dateTimeStr, allDay = false) {
      const s = String(dateTimeStr).trim();
      const dateOnly = /^\d{4}-\d{2}-\d{2}$/.test(s);
      const date = dateOnly
        ? new Date(Number(s.slice(0, 4)), Number(s.slice(5, 7)) - 1, Number(s.slice(8, 10)))
        : new Date(dateTimeStr);

      if (allDay) {
        return date.toLocaleDateString('zh-TW', {
          year: 'numeric',
          month: 'long',
          day: 'numeric',
          weekday: 'long',
        });
      }

      const pad = (n) => n < 10 ? '0' + n : n;
      const dateStr = date.toLocaleDateString('zh-TW', {
        year: 'numeric',
        month: 'long',
        day: 'numeric',
        weekday: 'long',
      });
      const timeStr = pad(date.getHours()) + ':' + pad(date.getMinutes());
      return dateStr + ' ' + timeStr;
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initEventDetailStandalone);
    } else {
      initEventDetailStandalone();
    }
  </script>
</body>
</html>
