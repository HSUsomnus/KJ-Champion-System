<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=0.5, maximum-scale=5.0, user-scalable=yes">
  <title>📊 試算表預覽</title>
  <link rel="icon" type="image/png" href="/images/logo.png">
  <!-- SheetJS 用於讀取 Excel 原始檔案 -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #fff;
      color: #333;
      -webkit-text-size-adjust: 100%;
    }

    /* 頂部固定標題列 */
    .header {
      position: sticky;
      top: 0;
      background: #fff;
      padding: 12px 16px;
      border-bottom: 1px solid #eee;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .header h1 {
      font-size: 15px;
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
      margin-right: 12px;
    }
    .btn-back {
      background: #3498db;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
    }
    /* 提示文字 */
    .hint {
      text-align: center;
      color: #999;
      font-size: 12px;
      padding: 12px 16px 4px;
    }

    /* 載入動畫 */
    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      color: #999;
    }
    .loading-container .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #eee;
      border-top: 3px solid #3498db;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 錯誤狀態 */
    .error-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      color: #e74c3c;
      padding: 24px;
      text-align: center;
    }

    /* 表格內容區：類 Excel / Google Sheet 版面 */
    .content {
      padding: 8px 0 24px;
      overflow: auto;
    }
    .sheet-title {
      margin: 20px 16px 10px;
      font-size: 15px;
      font-weight: 600;
      color: #555;
    }
    .table-wrapper {
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      margin-bottom: 16px;
    }
    .sheet-table {
      border-collapse: collapse;
      font-size: 13px;
      table-layout: fixed;
      min-width: max-content;
    }
    .sheet-table th,
    .sheet-table td {
      border: 1px solid #dadce0;
      padding: 4px 8px;
      min-width: 72px;
      max-width: 240px;
      height: 24px;
      line-height: 20px;
      word-break: break-word;
      overflow-wrap: break-word;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    /* 左上角空白格 */
    .sheet-table .corner {
      background: #f8f9fa;
      min-width: 36px;
      max-width: 36px;
      position: sticky;
      left: 0;
      z-index: 12;
      border-right: 2px solid #dadce0;
    }
    /* 欄位名 A B C ...（第一列）*/
    .sheet-table .col-header {
      background: #f8f9fa;
      font-weight: 600;
      font-size: 11px;
      color: #5f6368;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 11;
    }
    /* 列號 1 2 3 ...（第一欄）*/
    .sheet-table .row-header {
      background: #f8f9fa;
      font-weight: 600;
      font-size: 11px;
      color: #5f6368;
      text-align: center;
      min-width: 36px;
      max-width: 36px;
      position: sticky;
      left: 0;
      z-index: 10;
      border-right: 2px solid #dadce0;
    }
    .sheet-table tbody td.cell {
      background: #fff;
    }
    .sheet-table tbody tr:nth-child(even) td.cell {
      background: #fafafa;
    }
    .sheet-table td.num {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
  </style>
</head>
<body>

  <!-- 標題列 -->
  <div class="header">
    <h1 id="preview-title">📊 載入中...</h1>
    <button class="btn-back" onclick="goBack()">← 返回</button>
  </div>

  <!-- 載入動畫 -->
  <div id="loading" class="loading-container">
    <div class="spinner"></div>
    <p>載入試算表中...</p>
  </div>

  <!-- 錯誤狀態 -->
  <div id="error" class="error-container" style="display: none;">
    <div style="font-size: 48px; margin-bottom: 12px;">❌</div>
    <p id="error-msg">載入失敗</p>
    <button class="btn-back" onclick="goBack()" style="margin-top: 16px;">← 返回</button>
  </div>

  <!-- 表格內容 -->
  <div id="content" class="content" style="display: none;">
    <p class="hint">👆 可用雙指縮放查看</p>
    <div id="tables"></div>
  </div>

  <script>
    /**
     * 返回上一頁
     */
    function goBack() {
      window.history.back();
    }

    /**
     * HTML 轉義
     */
    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    /** 欄位索引轉 Excel 欄位名：0->A, 1->B, ..., 26->AA */
    function colToLetter(c) {
      let s = '';
      for (;;) {
        s = String.fromCharCode((c % 26) + 65) + s;
        c = Math.floor(c / 26) - 1;
        if (c < 0) break;
      }
      return s;
    }

    /**
     * 取得儲存格是否在合併範圍內；若為合併起點則回傳 { rowspan, colspan }，若被合併覆蓋則回傳 { skip: true }
     */
    function getMergeInfo(merges, r, c) {
      if (!merges || !merges.length) return null;
      for (let i = 0; i < merges.length; i++) {
        const m = merges[i];
        const sr = m.s.r, sc = m.s.c, er = m.e.r, ec = m.e.c;
        if (r >= sr && r <= er && c >= sc && c <= ec) {
          if (r === sr && c === sc)
            return { rowspan: er - sr + 1, colspan: ec - sc + 1 };
          return { skip: true };
        }
      }
      return null;
    }

    /**
     * 單一工作表的資料轉成類 Excel / Google Sheet 的 HTML 表格（含欄位 A B C、列號、合併儲存格）
     */
    function sheetToTableHtml(sheetName, sheet) {
      const merges = sheet['!merges'] || [];
      let sheetData = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '', raw: false });
      if (!sheetData.length) return `<h3 class="sheet-title">${escapeHtml(sheetName)}</h3><p class="hint">（空白工作表）</p>`;

      const maxCols = Math.max(...sheetData.map(row => (row && row.length) || 0));
      const normalized = sheetData.map(row => {
        const arr = Array.isArray(row) ? [...row] : [];
        while (arr.length < maxCols) arr.push('');
        return arr;
      });

      let html = `<h3 class="sheet-title">${escapeHtml(sheetName)}</h3><div class="table-wrapper"><table class="sheet-table"><thead><tr>`;
      html += '<th class="corner"></th>';
      for (let j = 0; j < maxCols; j++) html += `<th class="col-header">${colToLetter(j)}</th>`;
      html += '</tr></thead><tbody>';

      for (let i = 0; i < normalized.length; i++) {
        html += '<tr>';
        html += `<td class="row-header">${i + 1}</td>`;
        for (let j = 0; j < maxCols; j++) {
          const merge = getMergeInfo(merges, i, j);
          if (merge && merge.skip) continue;

          const cell = normalized[i][j];
          const text = cell != null ? String(cell).trim() : '';
          const isNum = /^-?[\d,.%]+$/.test(text);
          let attrs = merge && merge.rowspan ? ` rowspan="${merge.rowspan}" colspan="${merge.colspan}"` : '';
          html += `<td class="cell${isNum ? ' num' : ''}"${attrs}>${escapeHtml(text)}</td>`;
        }
        html += '</tr>';
      }
      html += '</tbody></table></div>';
      return html;
    }

    /**
     * 載入並顯示試算表（類 Excel / Google Sheet 環境）
     */
    async function loadPreview() {
      const urlParams = new URLSearchParams(window.location.search);
      const docId = urlParams.get('docId');
      const userId = urlParams.get('userId');
      const filename = urlParams.get('filename') || '試算表';

      document.getElementById('preview-title').textContent = '📊 ' + filename;
      document.title = '📊 ' + filename;

      if (!docId || !userId) {
        showError('缺少必要參數');
        return;
      }

      try {
        const response = await fetch(`/api/financial/download/${docId}?userId=${encodeURIComponent(userId)}`);
        if (!response.ok) throw new Error('下載失敗（' + response.status + '）');

        const arrayBuffer = await response.arrayBuffer();
        const workbook = XLSX.read(arrayBuffer, { type: 'array', cellDates: true });

        const tablesContainer = document.getElementById('tables');
        let html = '';
        workbook.SheetNames.forEach(name => {
          const sheet = workbook.Sheets[name];
          if (sheet) html += sheetToTableHtml(name, sheet);
        });

        tablesContainer.innerHTML = html;
        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'block';
      } catch (error) {
        console.error('預覽錯誤:', error);
        showError('載入失敗：' + error.message);
      }
    }

    /**
     * 顯示錯誤
     */
    function showError(msg) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error-msg').textContent = msg;
      document.getElementById('error').style.display = 'flex';
    }

    // 頁面載入後執行
    loadPreview();
  </script>
</body>
</html>
