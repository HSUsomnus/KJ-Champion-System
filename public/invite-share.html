<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>邀請分享</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .invite-share-box { padding: 24px; text-align: center; }
    .invite-share-box h2 { margin: 0 0 12px; font-size: 1.2rem; }
    .invite-share-box p { margin: 0; color: #666; font-size: 14px; }
  </style>
</head>
<body>
  <div id="invite-container" class="invite-share-box">
    <p>載入中...</p>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
(function() {
  var container = document.getElementById('invite-container');

  function showMsg(html) {
    container.innerHTML = html;
  }

  function getInvitedBy() {
    var m = /[?&]invitedBy=([^&]+)/.exec(window.location.search || '');
    return m ? decodeURIComponent(m[1]) : '';
  }

  async function run() {
    // 取得 LIFF ID（API 可能回傳 cfg.data.liffId 或 cfg.liffId）
    var cfgRes = await fetch('/api/line/liff-id');
    if (!cfgRes.ok) {
      showMsg('<p>❌ 取得設定失敗 (HTTP ' + cfgRes.status + ')，請稍後再試</p>');
      return;
    }
    var cfg = await cfgRes.json();
    var liffId = (cfg.data && cfg.data.liffId) || cfg.liffId || '';
    if (!liffId) {
      showMsg('<p>❌ 未設定 LIFF，請聯繫管理員（Vercel 請確認 LIFF_ID 環境變數已設定並重新部署）</p>');
      return;
    }

    await liff.init({ liffId: liffId });

    if (!liff.isInClient()) {
      var invitedBy = getInvitedBy();
      var liffUrl = 'https://liff.line.me/' + liffId + (invitedBy ? '?invitedBy=' + encodeURIComponent(invitedBy) : '');
      // 嘗試一次自動導向 LIFF URL，部分裝置會觸發「以 LINE 開啟」
      if (!sessionStorage.getItem('liff_redirect_tried')) {
        sessionStorage.setItem('liff_redirect_tried', '1');
        window.location.replace(liffUrl);
        return;
      }
      showMsg(
        '<h2>請在 LINE 中開啟</h2>' +
        '<p>此頁面需在 LINE App 內才能分享邀請字卡。</p>' +
        '<p style="margin-top:16px;"><a href="' + liffUrl + '" class="btn" style="display:inline-block;padding:12px 24px;background:#06C755;color:#fff;text-decoration:none;border-radius:8px;font-weight:bold;">點此在 LINE 中開啟</a></p>' +
        '<p style="margin-top:12px;font-size:12px;color:#999;">點擊上方按鈕會嘗試開啟 LINE App</p>'
      );
      return;
    }

    if (!liff.isAvailable('shareTargetPicker')) {
      showMsg('<h2>不支援分享</h2><p>此環境無法使用 shareTargetPicker。請使用最新版 LINE App。</p>');
      return;
    }

    var invitedBy = getInvitedBy();
    var baseUrl = window.location.origin;
    var msgRes = await fetch('/api/line/invite-message?baseUrl=' + encodeURIComponent(baseUrl) + '&inviterLineId=' + encodeURIComponent(invitedBy));
    var msgData = await msgRes.json();

    if (!msgData.success || !msgData.data || !msgData.data.flexMessage) {
      showMsg('<p>❌ 取得邀請字卡失敗：' + (msgData.message || '未知錯誤') + '</p>');
      return;
    }

    var flexMsg = {
      type: 'flex',
      altText: '邀請你加入康九冠軍事業部！',
      contents: msgData.data.flexMessage
    };

    try {
      var result = await liff.shareTargetPicker([flexMsg]);
      if (result) {
        showMsg('<h2>✅ 已分享！</h2><p>邀請字卡已成功發送給好友</p>');
        if (typeof liff.closeWindow === 'function') {
          setTimeout(function() { liff.closeWindow(); }, 1500);
        }
      } else {
        showMsg('<h2>已取消</h2><p>您未選擇分享對象</p>');
      }
    } catch (err) {
      var errMsg = (err && err.message) ? err.message : String(err || '');
      if (/cancel|cancelled|user/i.test(errMsg)) {
        showMsg('<h2>已取消</h2><p>您未選擇分享對象</p>');
      } else {
        showMsg('<p>❌ 分享失敗：' + errMsg + '</p>');
      }
    }
  }

  run().catch(function(err) {
    showMsg('<p>❌ 錯誤：' + (err && err.message ? err.message : String(err)) + '</p>');
  });
})();
  </script>
</body>
</html>
