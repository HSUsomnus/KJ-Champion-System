<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="財力上傳管理">
  <title>財力上傳</title>
  <link rel="icon" type="image/png" href="/images/logo.png">
  <link rel="stylesheet" href="/css/style.css">
  <!-- SheetJS 用於讀取 Excel -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <!-- JSZip 用於壓縮 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
  <div class="container page-financial-upload">
    <!-- 頁面標題 -->
    <div class="page-header-with-back">
      <button type="button" class="btn-back" onclick="history.back()">←</button>
      <h1 class="page-title-center">📊 財力上傳</h1>
    </div>

    <!-- 登入驗證表單 -->
    <div id="auth-form" class="hidden">
      <div class="card">
        <div style="text-align: center; margin-bottom: 24px;">
          <img src="/images/logo.png" alt="康九" style="width: 80px; height: 80px; margin-bottom: 12px;">
          <h2 class="card-title">🔐 財力上傳</h2>
          <p style="color: var(--text-light); font-size: 14px; margin-top: 8px;">
            請使用 LINE 登入以繼續
          </p>
        </div>
        
        <button type="button" class="btn btn-block" onclick="loginWithLine()" style="background: #06C755; color: #fff; display: flex; align-items: center; justify-content: center; gap: 8px;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M19.365 9.863c.349 0 .63.285.63.631 0 .345-.281.63-.63.63H17.61v1.125h1.755c.349 0 .63.283.63.63 0 .344-.281.629-.63.629h-2.386c-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.63-.63h2.386c.346 0 .627.285.627.63 0 .349-.281.63-.63.63H17.61v1.125h1.755zm-3.855 3.016c0 .27-.174.51-.432.596-.064.021-.133.031-.199.031-.211 0-.391-.09-.51-.25l-2.443-3.317v2.94c0 .344-.279.629-.631.629-.346 0-.626-.285-.626-.629V8.108c0-.27.173-.51.43-.595.06-.023.136-.033.194-.033.195 0 .375.104.495.254l2.462 3.33V8.108c0-.345.282-.63.63-.63.345 0 .63.285.63.63v4.771zm-5.741 0c0 .344-.282.629-.631.629-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.63-.63.346 0 .628.285.628.63v4.771zm-2.466.629H4.917c-.345 0-.63-.285-.63-.629V8.108c0-.345.285-.63.63-.63.348 0 .63.285.63.63v4.141h1.756c.348 0 .629.283.629.63 0 .344-.282.629-.629.629M24 10.314C24 4.943 18.615.572 12 .572S0 4.943 0 10.314c0 4.811 4.27 8.842 10.035 9.608.391.082.923.258 1.058.59.12.301.079.766.038 1.08l-.164 1.02c-.045.301-.24 1.186 1.049.645 1.291-.539 6.916-4.078 9.436-6.975C23.176 14.393 24 12.458 24 10.314" fill="currentColor"/>
          </svg>
          使用 LINE 登入
        </button>
      </div>
    </div>

    <!-- 載入動畫 -->
    <div id="loading" class="loading data-loading">
      <div class="data-loading-inner">
        <img src="/images/logo.png" alt="康九" class="data-loading-logo">
        <p class="data-loading-text">載入中...</p>
      </div>
    </div>

    <!-- 主要內容 -->
    <div id="main-content" class="hidden">
      <!-- 歷史記錄 -->
      <div class="card">
        <h2 class="card-title">📁 歷史上傳記錄</h2>
        <div id="documents-list"></div>
      </div>

      <!-- 上傳新文件 -->
      <div class="card" style="margin-top: 16px;">
        <h2 class="card-title">📤 上傳新財力文件</h2>
        <p style="color: var(--text-light); font-size: 14px; margin-bottom: 12px;">
          支援格式：Excel (.xlsx, .xls), CSV (.csv), 或任何試算表檔案
        </p>
        <input type="file" id="file-input" style="display: none;">
        <button type="button" class="btn btn-primary btn-block" onclick="selectFile()">
          選擇檔案
        </button>
        <div id="file-info" class="hidden" style="margin-top: 12px; padding: 12px; background: var(--bg-color); border-radius: 8px;">
          <p style="margin: 0 0 8px; font-size: 14px;">📄 <span id="selected-filename"></span></p>
          <p style="margin: 0; font-size: 14px; color: var(--text-light);">大小: <span id="selected-filesize"></span></p>
        </div>
        <button type="button" id="upload-btn" class="btn btn-success btn-block hidden" onclick="uploadFile()" style="margin-top: 12px;">
          開始上傳
        </button>
      </div>
    </div>

    <!-- 瀏覽視窗（模態框） -->
    <div id="preview-modal" class="modal hidden">
      <div class="modal-content" style="max-width: 90%; max-height: 90vh; overflow: auto;">
        <div class="modal-header">
          <h2 id="preview-title">文件預覽</h2>
          <button class="modal-close" onclick="closePreview()">✕</button>
        </div>
        <div id="preview-content" style="padding: 16px; overflow: auto;"></div>
      </div>
    </div>
  </div>

  <script src="/js/financial-upload.js"></script>
</body>
</html>
