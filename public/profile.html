<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="個人資料管理">
  <title>個人資料</title>
  <link rel="icon" type="image/png" href="/images/logo.png">
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
  <!-- 網址帶 ?eruda=1 時載入 Eruda，方便手機 LINE 瀏覽器看 Console -->
  <script src="/js/eruda-loader.js"></script>
  <div class="container data-loading-parent">
    <!-- 頁面標題：註冊頁顯示「註冊」，個人資料頁顯示「個人資料」 -->
    <div class="page-header-row">
      <button type="button" class="btn-refresh-cache" onclick="if(window.cacheService){window.cacheService.clearCache();}location.reload();" title="清除快取並重新整理" aria-label="清除快取並重新整理">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      </button>
      <h1 id="page-title-text" class="text-center page-title">👤 個人資料</h1>
    </div>

    <!-- 資料加載動畫（與行事曆進入動畫一致：透明毛玻璃 + 康九 logo） -->
    <div id="loading" class="loading data-loading data-loading-overlay">
      <div class="data-loading-inner">
        <img src="/images/logo.png" alt="康九" class="data-loading-logo">
        <p class="data-loading-text">載入中...</p>
      </div>
    </div>

    <!-- 個人資料顯示 -->
    <div id="profile-display" class="hidden">
      <!-- LINE 頭像和姓名 -->
      <div class="card text-center">
        <img id="profile-avatar" src="" alt="頭像" class="member-avatar" style="width: 100px; height: 100px; margin: 0 auto 16px;">
        <h2 id="profile-name">姓名</h2>
        <!-- 星等顯示：有顏色外框包住圖示+文字 -->
        <div id="profile-star-display" class="profile-star-display" style="margin-top: 8px;">
          <span id="profile-star-icon" class="member-star 白星">白星</span>
        </div>
      </div>

      <!-- 個人資料顯示（唯讀模式） -->
      <div class="card" id="profile-view-mode">
        <div class="form-group">
          <label class="form-label">真實姓名</label>
          <div class="form-input" style="background-color: var(--bg-color); border: none; padding: 12px;" id="view-name">-</div>
        </div>

        <div class="form-group">
          <label class="form-label">Email</label>
          <div class="form-input" style="background-color: var(--bg-color); border: none; padding: 12px;" id="view-email">-</div>
        </div>

        <div class="form-group">
          <label class="form-label">電話號碼</label>
          <div class="form-input" style="background-color: var(--bg-color); border: none; padding: 12px;" id="view-phone">-</div>
        </div>

        <div class="form-group">
          <label class="form-label">星等</label>
          <div class="form-input" style="background-color: var(--bg-color); border: none; padding: 12px;" id="view-starLevel">-</div>
        </div>

        <!-- 進階資訊區塊（含課程紀錄、特斯拉加盟主、團隊負責事項、課程志工） -->
        <div class="form-group" style="margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border-color, #eee);">
          <label class="form-label" style="font-weight: 600;">📋 進階資訊</label>
          <div class="form-group">
            <label class="form-label">課程紀錄</label>
            <div class="form-input" style="background-color: var(--bg-color); border: none; padding: 12px; min-height: auto;" id="view-courseRecord">-</div>
          </div>
          <div class="form-group">
            <label class="form-label">是否為特斯拉出行加盟主</label>
            <div class="form-input" style="background-color: var(--bg-color); border: none; padding: 12px;" id="view-teslaFranchisee">-</div>
          </div>
          <div class="form-group">
            <label class="form-label">團隊負責事項</label>
            <div class="form-input" style="background-color: var(--bg-color); border: none; padding: 12px; min-height: auto;" id="view-teamResponsibilities">-</div>
          </div>
          <div class="form-group">
            <label class="form-label">課程志工</label>
            <div id="view-volunteerRecords" class="form-input" style="background-color: var(--bg-color); border: none; padding: 12px; min-height: auto;">-</div>
          </div>
        </div>

        <button type="button" class="btn btn-primary btn-block" onclick="enableEditMode()">✏️ 編輯資料</button>
      </div>

      <!-- 個人資料表單（編輯模式） -->
      <div class="card hidden" id="profile-edit-mode">
        <form id="profile-form">
          <div class="form-group">
            <label class="form-label">真實姓名</label>
            <input type="text" id="name" class="form-input" required>
          </div>

          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" id="email" class="form-input">
          </div>

          <div class="form-group">
            <label class="form-label">電話號碼</label>
            <input type="tel" id="phone" class="form-input">
          </div>

          <div class="form-group">
            <label class="form-label">星等</label>
            <select id="starLevel" class="form-select">
              <option value="白星">白星</option>
              <option value="綠星">綠星</option>
              <option value="橙星">橙星</option>
              <option value="紅星">紅星</option>
              <option value="紫星">紫星</option>
            </select>
          </div>

          <!-- 進階資訊（編輯模式） -->
          <div class="form-group" style="margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border-color, #eee);">
            <label class="form-label" style="font-weight: 600;">📋 進階資訊</label>
            <div class="form-group">
              <label class="form-label">課程紀錄</label>
              <div class="checkbox-group">
                <label class="checkbox-label">
                  <input type="checkbox" name="courseRecord" value="正式金流課" class="course-checkbox">
                  <span>正式金流課</span>
                </label>
                <label class="checkbox-label">
                  <input type="checkbox" name="courseRecord" value="財富藍圖課" class="course-checkbox">
                  <span>財富藍圖課</span>
                </label>
                <label class="checkbox-label">
                  <input type="checkbox" name="courseRecord" value="財富實踐旅程" class="course-checkbox">
                  <span>財富實踐旅程</span>
                </label>
                <label class="checkbox-label">
                  <input type="checkbox" name="courseRecord" value="夢想清單專班" class="course-checkbox">
                  <span>夢想清單專班</span>
                </label>
                <label class="checkbox-label">
                  <input type="checkbox" name="courseRecord" value="群星計畫" class="course-checkbox">
                  <span>群星計畫</span>
                </label>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">是否為特斯拉出行加盟主</label>
              <select id="teslaFranchisee" class="form-select">
                <option value="">未填</option>
                <option value="是">是</option>
                <option value="否">否</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">團隊負責事項</label>
              <input type="text" id="teamResponsibilities" class="form-input" placeholder="請輸入負責事項">
            </div>
            <div class="form-group">
              <label class="form-label">課程志工</label>
              <div id="volunteer-records-list" class="volunteer-records-list"></div>
              <button type="button" class="btn btn-secondary mt-8" id="btn-add-volunteer">➕ 新增記錄</button>
              <!-- 新增記錄用的小表單（可隱藏／顯示） -->
              <div id="volunteer-add-form" class="hidden" style="margin-top: 12px; padding: 12px; background: var(--bg-color); border-radius: 8px;">
                <div class="form-group">
                  <label class="form-label">日期</label>
                  <input type="date" id="volunteer-date" class="form-input">
                </div>
                <div class="form-group">
                  <label class="form-label">選項</label>
                  <select id="volunteer-option" class="form-select">
                    <option value="金流">金流</option>
                    <option value="藍圖">藍圖</option>
                  </select>
                </div>
                <div class="event-actions">
                  <button type="button" class="btn btn-primary" id="volunteer-confirm">確定</button>
                  <button type="button" class="btn btn-secondary" id="volunteer-cancel">取消</button>
                </div>
              </div>
            </div>
          </div>

          <div class="event-actions">
            <button type="submit" class="btn btn-primary">儲存</button>
          </div>
        </form>
      </div>
    </div>

    <!-- 註冊表單（標題與按鈕為「註冊」） -->
    <div id="register-form" class="hidden">
      <div class="card">
        <h2 class="text-center mb-16">歡迎加入！請填寫基本資料</h2>
        <form id="register-form-content">
          <div class="form-group">
            <label class="form-label">真實姓名 *</label>
            <input type="text" id="reg-name" class="form-input" required>
          </div>

          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" id="reg-email" class="form-input">
          </div>

          <div class="form-group">
            <label class="form-label">電話號碼</label>
            <input type="tel" id="reg-phone" class="form-input">
          </div>

          <div class="form-group">
            <label class="form-label">星等</label>
            <select id="reg-starLevel" class="form-select">
              <option value="白星">白星</option>
              <option value="綠星">綠星</option>
              <option value="橙星">橙星</option>
              <option value="紅星">紅星</option>
              <option value="紫星">紫星</option>
            </select>
          </div>

          <!-- 進階資訊（註冊時可選填） -->
          <div class="form-group" style="margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border-color, #eee);">
            <label class="form-label" style="font-weight: 600;">📋 進階資訊（選填）</label>
            <div class="form-group">
              <label class="form-label">課程紀錄</label>
              <div class="checkbox-group">
                <label class="checkbox-label">
                  <input type="checkbox" name="reg-courseRecord" value="正式金流課" class="course-checkbox">
                  <span>正式金流課</span>
                </label>
                <label class="checkbox-label">
                  <input type="checkbox" name="reg-courseRecord" value="財富藍圖課" class="course-checkbox">
                  <span>財富藍圖課</span>
                </label>
                <label class="checkbox-label">
                  <input type="checkbox" name="reg-courseRecord" value="財富實踐旅程" class="course-checkbox">
                  <span>財富實踐旅程</span>
                </label>
                <label class="checkbox-label">
                  <input type="checkbox" name="reg-courseRecord" value="夢想清單專班" class="course-checkbox">
                  <span>夢想清單專班</span>
                </label>
                <label class="checkbox-label">
                  <input type="checkbox" name="reg-courseRecord" value="群星計畫" class="course-checkbox">
                  <span>群星計畫</span>
                </label>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">是否為特斯拉出行加盟主</label>
              <select id="reg-teslaFranchisee" class="form-select">
                <option value="">未填</option>
                <option value="是">是</option>
                <option value="否">否</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">團隊負責事項</label>
              <input type="text" id="reg-teamResponsibilities" class="form-input" placeholder="請輸入負責事項">
            </div>
          </div>

          <button type="submit" class="btn btn-primary btn-block" id="register-submit-btn">註冊</button>
        </form>
      </div>
    </div>
  </div>

  <!-- 底部導航欄 -->
  <nav class="bottom-nav">
    <a href="/index.html" class="nav-item">
      <div>📅</div>
      <span>行事曆</span>
    </a>
    <a href="/list.html" class="nav-item">
      <div>📋</div>
      <span>列表</span>
    </a>
    <a href="/members.html" class="nav-item">
      <div>👥</div>
      <span>成員</span>
    </a>
    <a href="/profile.html" class="nav-item active">
      <div>👤</div>
      <span>個人</span>
    </a>
  </nav>

  <script src="/js/liff.js"></script>
  <script src="/js/scroll-restore.js"></script>
  <script src="/js/share-dialog.js"></script>
  <script src="/js/profile.js"></script>
</body>
</html>
